server:
  port: 8080

spring:
  kafka:
      bootstrap-servers: localhost:9092
      producer:
        key-serializer: org.apache.kafka.common.serialization.StringSerializer
        value-serializer: org.springframework.kafka.support.serializer.JsonSerializer
      consumer:
        group-id: finflow-group
        auto-offset-reset: earliest
        key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
        value-deserializer: org.springframework.kafka.support.serializer.JsonDeserializer
        properties:
          spring.json.trusted.packages: "com.finflow.kafka"
  application:
      name=finflow-backend
  datasource:
    url: jdbc:postgresql://localhost:5432/finflow_db
    username: postgres
    password: 1418
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true

  data:
    redis:
      host: localhost
      port: 6379
      timeout: 60000

  cache:
    type: redis
    redis:
      time-to-live: 600000   # 10 minutes

app:
  jwt:
    secret: finflow_super_secret_key_2024_very_long_for_hmac_sha256_algorithm
    expiration: 86400000     # 24 hours

  kafka:
    topics:
      transaction-events: transaction-events
      budget-alerts: budget-alerts
      audit-logs: audit-logs

springdoc:
  swagger-ui:
    path: /swagger-ui.html
  api-docs:
    path: /api-docs